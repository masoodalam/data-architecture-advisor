<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Data Architecture Advisor</title>
    <script>
      const base = "/data-architecture-advisor";
      const path = window.location.pathname;
      const route = path.startsWith(base) ? path.slice(base.length) : "/";
      sessionStorage.setItem("data-architecture-advisor:redirect", route || "/");
      window.location.replace(`${base}/`);
    </script>
  </head>
  <body></body>
</html>
