services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "3001"
    environment:
      - AWS_REGION=eu-west-2
      - BEDROCK_MODEL_ID=eu.anthropic.claude-opus-4-6-v1
      - PORT=3001
    restart: unless-stopped
